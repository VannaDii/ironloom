name: Bug report
description: Report a correctness, reliability, policy, workflow, or tooling defect.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the problem directly.
      placeholder: What is broken?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which Ironloom surface is failing?
      options:
        - Rust runtime
        - Discord operator adapter
        - GitHub source-of-truth adapter
        - SonarCloud quality gate
        - Storage or artifacts
        - Docker image
        - Helm chart
        - Documentation or GitHub Pages
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain why this matters.
      placeholder: What behavior, workflow, or operator action is affected?
    validations:
      required: true
  - type: textarea
    id: operator_impact
    attributes:
      label: Operator and audit impact
      description: Explain any GitHub, Discord, SonarCloud, or audit-trail impact.
      placeholder: Which operator flow, audit artifact, or control-plane action is affected?
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide exact reproduction steps.
      placeholder: |
        1. cargo test --workspace --all-features
        2. helm template ironloom deploy/helm/ironloom
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or artifacts
      description: Include failing command output, artifact names, or links.
