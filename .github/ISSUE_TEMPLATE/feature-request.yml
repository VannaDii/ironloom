name: Feature request
description: Propose a new capability, workflow improvement, or delivery enhancement.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the current limitation.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which Ironloom surface does this proposal target first?
      options:
        - Rust runtime
        - Process graph
        - Worker registry
        - Discord operator adapter
        - GitHub source-of-truth adapter
        - SonarCloud quality gate
        - Docker or Helm delivery
        - Documentation or GitHub Pages
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the expected behavior clearly.
    validations:
      required: true
  - type: textarea
    id: operator_impact
    attributes:
      label: Operator and audit impact
      description: Explain any GitHub, Discord, SonarCloud, or audit-trail impact.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Note crate boundaries, policy concerns, or things that must not change.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the outcomes that would make this complete.
    validations:
      required: true
