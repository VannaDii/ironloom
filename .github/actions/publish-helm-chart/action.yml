name: Publish Helm Chart
description: Package, sign, and publish the DevPlat Helm chart to GHCR OCI.

inputs:
  publish_mode:
    description: Publish mode for the chart artifact.
    required: true
  ref:
    description: Git ref to publish.
    required: true
  pr_number:
    description: Pull request number for dev chart versioning.
    required: false
    default: ''
  change_title:
    description: Change title used for Artifact Hub metadata.
    required: false
    default: ''
  change_body:
    description: Change body used for Artifact Hub metadata.
    required: false
    default: ''
  image_tag:
    description: Runtime image tag to write into chart values. Defaults to metadata-derived tag.
    required: false
    default: ''
  github_token:
    description: GitHub token with package write access.
    required: true
  helm_gpg_private:
    description: ASCII-armored Helm signing private key.
    required: true
  helm_gpg_public:
    description: ASCII-armored Helm signing public key.
    required: true
  helm_key_id:
    description: Artifact Hub API key ID.
    required: true
  helm_key_secret:
    description: Artifact Hub API key secret.
    required: true

outputs:
  chart_version:
    description: Published Helm chart version.
    value: ${{ steps.publish_meta.outputs.chart_version }}
  image_tag:
    description: Runtime image tag written into chart values.
    value: ${{ steps.publish_meta.outputs.image_tag }}

runs:
  using: composite
  steps:
    - name: Checkout publish ref
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Verify Node alignment
      shell: bash
      run: npm run verify:node

    - name: Resolve publish metadata
      id: publish_meta
      shell: bash
      env:
        CHANGE_BODY: ${{ inputs.change_body }}
        CHANGE_TITLE: ${{ inputs.change_title }}
        INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        PR_NUMBER: ${{ inputs.pr_number }}
        PUBLISH_MODE: ${{ inputs.publish_mode }}
      run: |
        owner="${GITHUB_REPOSITORY_OWNER,,}"
        package_version="$(
          node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/openclaw/package.json', 'utf8')).version);"
        )"
        short_sha="$(git rev-parse --short=12 HEAD)"
        summary_title="${CHANGE_TITLE%%$'\n'*}"

        case "$PUBLISH_MODE" in
          stable)
            chart_version="${package_version}+main.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            image_tag="$package_version"
            prerelease='false'
            ;;
          dev)
            if [[ -n "$PR_NUMBER" ]]; then
              prerelease_scope="pr.${PR_NUMBER}"
            else
              prerelease_scope='manual'
            fi
            chart_version="${package_version}-dev.${prerelease_scope}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            image_tag="${package_version}-dev.${prerelease_scope}.${short_sha}"
            prerelease='true'
            ;;
          *)
            echo "Unsupported publish mode: ${PUBLISH_MODE}" >&2
            exit 1
            ;;
        esac

        if [[ -n "$INPUT_IMAGE_TAG" ]]; then
          image_tag="$INPUT_IMAGE_TAG"
        fi

        if [[ -n "$PR_NUMBER" && -n "$summary_title" ]]; then
          artifacthub_change_description="PR #${PR_NUMBER}: ${summary_title}"
        elif [[ -n "$summary_title" ]]; then
          artifacthub_change_description="${summary_title}"
        else
          artifacthub_change_description="Publish from ${short_sha}"
        fi

        combined_change_context="${summary_title}"$'\n'"${CHANGE_BODY}"
        if grep -Eiq '(^|[^[:alnum:]_])(security|vulnerab[a-z]*|cve)([^[:alnum:]_]|$)' <<< "$combined_change_context"; then
          artifacthub_change_kind='security'
          contains_security_updates='true'
        elif grep -Eiq '(^|[^[:alnum:]_])(fix(e[sd])?|bug(s|fix(es|ed)?)?|regression(s)?|patch(es|ed)?)([^[:alnum:]_]|$)' <<< "$combined_change_context"; then
          artifacthub_change_kind='fixed'
          contains_security_updates='false'
        else
          artifacthub_change_kind='changed'
          contains_security_updates='false'
        fi

        echo "owner=${owner}" >> "$GITHUB_OUTPUT"
        echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
        echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
        echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
        echo "artifacthub_change_kind=${artifacthub_change_kind}" >> "$GITHUB_OUTPUT"
        echo "contains_security_updates=${contains_security_updates}" >> "$GITHUB_OUTPUT"
        echo "artifacthub_image=ghcr.io/${owner}/devplat-openclaw-runtime:${image_tag}" >> "$GITHUB_OUTPUT"
        echo "chart_repository_url=oci://ghcr.io/${owner}/charts/devplat" >> "$GITHUB_OUTPUT"
        {
          echo "artifacthub_change_description<<EOF"
          printf '%s' "$artifacthub_change_description"
          echo
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Stage chart payload
      id: stage
      shell: bash
      run: |
        node scripts/stage-helm-chart.mjs \
          --out-dir "${RUNNER_TEMP}/helm-chart" \
          --chart-version "${{ steps.publish_meta.outputs.chart_version }}" \
          --app-version "${{ steps.publish_meta.outputs.image_tag }}" \
          --image-tag "${{ steps.publish_meta.outputs.image_tag }}" \
          --artifacthub-image "${{ steps.publish_meta.outputs.artifacthub_image }}" \
          --artifacthub-prerelease "${{ steps.publish_meta.outputs.prerelease }}" \
          --artifacthub-contains-security-updates "${{ steps.publish_meta.outputs.contains_security_updates }}" \
          --artifacthub-change-kind "${{ steps.publish_meta.outputs.artifacthub_change_kind }}" \
          --artifacthub-change-description "${{ steps.publish_meta.outputs.artifacthub_change_description }}" \
          > "${RUNNER_TEMP}/helm-chart-manifest.json"
        echo "chart_dir=${RUNNER_TEMP}/helm-chart" >> "$GITHUB_OUTPUT"

    - name: Set up Helm
      uses: azure/setup-helm@v5

    - name: Set up ORAS
      uses: oras-project/setup-oras@v2

    - name: Lint chart
      shell: bash
      run: helm lint "${{ steps.stage.outputs.chart_dir }}"

    - name: Verify Artifact Hub chart files
      shell: bash
      run: |
        test -f "${{ steps.stage.outputs.chart_dir }}/README.md"
        test -f "${{ steps.stage.outputs.chart_dir }}/LICENSE"
        test -f "${{ steps.stage.outputs.chart_dir }}/values.schema.json"

    - name: Prepare Helm signing material
      id: signing
      shell: bash
      env:
        HELM_GPG_PRIVATE: ${{ inputs.helm_gpg_private }}
        HELM_GPG_PUBLIC: ${{ inputs.helm_gpg_public }}
      run: |
        if [[ -z "$HELM_GPG_PRIVATE" || -z "$HELM_GPG_PUBLIC" ]]; then
          echo 'Helm signing credentials are missing. Ensure HELM_GPG_PRIVATE and HELM_GPG_PUBLIC are set.' >&2
          exit 1
        fi

        export GNUPGHOME="${RUNNER_TEMP}/helm-signing-gnupg"
        mkdir -p "$GNUPGHOME"
        chmod 700 "$GNUPGHOME"

        private_key_path="${RUNNER_TEMP}/helm-signing-private-key.asc"
        public_key_path="${RUNNER_TEMP}/helm-signing-public-key.asc"
        secret_keyring_path="${RUNNER_TEMP}/helm-signing-secring.gpg"
        public_keyring_path="${RUNNER_TEMP}/helm-signing-pubring.gpg"

        printf '%s\n' "$HELM_GPG_PRIVATE" > "$private_key_path"
        printf '%s\n' "$HELM_GPG_PUBLIC" > "$public_key_path"
        chmod 600 "$private_key_path" "$public_key_path"

        gpg --batch --import "$private_key_path"
        gpg --batch --import "$public_key_path"

        key_name="$(
          gpg --batch --list-secret-keys --with-colons \
            | awk -F: '$1 == "uid" { print $10; exit }'
        )"
        if [[ -z "$key_name" ]]; then
          echo 'Unable to resolve a signing key UID from HELM_GPG_PRIVATE.' >&2
          exit 1
        fi

        gpg --batch --export-secret-keys "$key_name" > "$secret_keyring_path"
        gpg --batch --export "$key_name" > "$public_keyring_path"

        echo "key_name=${key_name}" >> "$GITHUB_OUTPUT"
        echo "secret_keyring=${secret_keyring_path}" >> "$GITHUB_OUTPUT"
        echo "public_keyring=${public_keyring_path}" >> "$GITHUB_OUTPUT"

    - name: Package chart
      id: package_chart
      shell: bash
      run: |
        mkdir -p .artifacts/helm
        helm package "${{ steps.stage.outputs.chart_dir }}" \
          --sign \
          --key "${{ steps.signing.outputs.key_name }}" \
          --keyring "${{ steps.signing.outputs.secret_keyring }}" \
          --destination .artifacts/helm
        chart_archive="$(find .artifacts/helm -maxdepth 1 -name 'devplat-*.tgz' | head -n 1)"
        test -n "$chart_archive"
        echo "chart_archive=${chart_archive}" >> "$GITHUB_OUTPUT"

    - name: Verify packaged chart contents
      shell: bash
      run: |
        tar -tzf "${{ steps.package_chart.outputs.chart_archive }}" | sort > "${RUNNER_TEMP}/chart-files.txt"
        for expected_path in \
          devplat/Chart.yaml \
          devplat/README.md \
          devplat/LICENSE \
          devplat/values.schema.json \
          devplat/values.yaml \
          devplat/templates/deployment.yaml
        do
          grep -Fx "$expected_path" "${RUNNER_TEMP}/chart-files.txt"
        done

        test -f "${{ steps.package_chart.outputs.chart_archive }}.prov"
        tar -xOf "${{ steps.package_chart.outputs.chart_archive }}" devplat/README.md >/dev/null

    - name: Verify chart provenance
      shell: bash
      run: |
        helm verify "${{ steps.package_chart.outputs.chart_archive }}" \
          --keyring "${{ steps.signing.outputs.public_keyring }}"

    - name: Log in to GHCR OCI registry
      shell: bash
      run:
        echo "${{ inputs.github_token }}" | helm registry login ghcr.io -u "${{
        github.actor }}" --password-stdin

    - name: Publish chart
      shell: bash
      run: |
        chart_archive="${{ steps.package_chart.outputs.chart_archive }}"
        test -n "$chart_archive"
        helm push "$chart_archive" "oci://ghcr.io/${{ steps.publish_meta.outputs.owner }}/charts"

    - name: Register chart repository in Artifact Hub
      id: artifacthub_repository
      shell: bash
      env:
        ARTIFACTHUB_API_BASE: https://artifacthub.io/api/v1
        ARTIFACTHUB_REPOSITORY_NAME: devplat
        ARTIFACTHUB_REPOSITORY_DISPLAY_NAME: DevPlat
        ARTIFACTHUB_REPOSITORY_URL: ${{ steps.publish_meta.outputs.chart_repository_url }}
        HELM_KEY_ID: ${{ inputs.helm_key_id }}
        HELM_KEY_SECRET: ${{ inputs.helm_key_secret }}
      run: |
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT

        if [[ -z "$HELM_KEY_ID" || -z "$HELM_KEY_SECRET" ]]; then
          echo 'Artifact Hub credentials are missing. Ensure HELM_KEY_ID and HELM_KEY_SECRET are set.' >&2
          exit 1
        fi

        payload="$(
          jq -cn \
            --arg name "$ARTIFACTHUB_REPOSITORY_NAME" \
            --arg display_name "$ARTIFACTHUB_REPOSITORY_DISPLAY_NAME" \
            --arg url "$ARTIFACTHUB_REPOSITORY_URL" \
            '{kind: 0, name: $name, display_name: $display_name, url: $url}'
        )"

        if ! update_status="$(
          curl -sS \
            -o "$tmp_dir/update-response.json" \
            -w '%{http_code}' \
            -X PUT \
            -H "X-API-KEY-ID: ${HELM_KEY_ID}" \
            -H "X-API-KEY-SECRET: ${HELM_KEY_SECRET}" \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "${ARTIFACTHUB_API_BASE}/repositories/user/${ARTIFACTHUB_REPOSITORY_NAME}"
        )"; then
          echo 'Artifact Hub repository update request failed.' >&2
          cat "$tmp_dir/update-response.json" >&2
          exit 1
        fi

        if [[ "$update_status" == '404' ]]; then
          if ! create_status="$(
            curl -sS \
              -o "$tmp_dir/create-response.json" \
              -w '%{http_code}' \
              -X POST \
              -H "X-API-KEY-ID: ${HELM_KEY_ID}" \
              -H "X-API-KEY-SECRET: ${HELM_KEY_SECRET}" \
              -H 'Content-Type: application/json' \
              --data "$payload" \
              "${ARTIFACTHUB_API_BASE}/repositories/user"
          )"; then
            echo 'Artifact Hub repository creation request failed.' >&2
            cat "$tmp_dir/create-response.json" >&2
            exit 1
          fi

          if [[ "$create_status" == '400' ]]; then
            if ! grep -Eiq 'already exists|already been taken|duplicate' "$tmp_dir/create-response.json"; then
              cat "$tmp_dir/create-response.json" >&2
              echo 'Artifact Hub repository creation returned HTTP 400 without an expected duplicate-repository error.' >&2
              exit 1
            fi
          elif [[ "$create_status" != '201' && "$create_status" != '409' ]]; then
            cat "$tmp_dir/create-response.json" >&2
            echo "Artifact Hub repository creation failed with status ${create_status}." >&2
            exit 1
          fi
        elif [[ "$update_status" != '204' ]]; then
          cat "$tmp_dir/update-response.json" >&2
          echo "Artifact Hub repository update failed with status ${update_status}." >&2
          exit 1
        fi

        encoded_repository_url="$(jq -rn --arg value "$ARTIFACTHUB_REPOSITORY_URL" '$value | @uri')"
        if ! search_response="$(
          curl -fsS \
            -H "X-API-KEY-ID: ${HELM_KEY_ID}" \
            -H "X-API-KEY-SECRET: ${HELM_KEY_SECRET}" \
            "${ARTIFACTHUB_API_BASE}/repositories/search?kind=0&url=${encoded_repository_url}"
        )"; then
          echo 'Artifact Hub repository lookup request failed.' >&2
          exit 1
        fi
        repository_id="$(
          printf '%s' "$search_response" \
            | jq -r --arg url "$ARTIFACTHUB_REPOSITORY_URL" '.[] | select(.url == $url) | .repository_id' \
            | head -n 1
        )"
        if [[ -z "$repository_id" ]]; then
          echo "Artifact Hub repository lookup did not return a repository_id for URL: ${ARTIFACTHUB_REPOSITORY_URL}" >&2
          echo 'Artifact Hub search response:' >&2
          printf '%s\n' "$search_response" >&2
          exit 1
        fi
        echo "repository_id=${repository_id}" >> "$GITHUB_OUTPUT"

    - name: Create Artifact Hub repository metadata
      id: artifacthub_metadata
      shell: bash
      run: |
        metadata_path=".artifacts/helm/artifacthub-repo.yml"
        node --input-type=module -e "
          import { readFileSync, writeFileSync } from 'node:fs';
          const template = readFileSync(process.argv[1], 'utf8');
          const rendered = template.replace(
            '__ARTIFACTHUB_REPOSITORY_ID__',
            process.argv[3],
          );
          writeFileSync(process.argv[2], rendered);
        " \
          deploy/artifacthub/devplat/artifacthub-repo.yml \
          "$metadata_path" \
          "${{ steps.artifacthub_repository.outputs.repository_id }}"
        echo "metadata_path=${metadata_path}" >> "$GITHUB_OUTPUT"

    - name: Verify Artifact Hub metadata payload
      shell: bash
      run: |
        test -f "${{ steps.artifacthub_metadata.outputs.metadata_path }}"
        grep -E '^repositoryID: [0-9a-f-]+$' "${{ steps.artifacthub_metadata.outputs.metadata_path }}"

    - name: Log in to GHCR for ORAS
      shell: bash
      run:
        echo "${{ inputs.github_token }}" | oras login ghcr.io -u "${{ github.actor
        }}" --password-stdin

    - name: Publish Artifact Hub metadata
      shell: bash
      run: |
        oras push \
          "ghcr.io/${{ steps.publish_meta.outputs.owner }}/charts/devplat:artifacthub.io" \
          --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
          "${{ steps.artifacthub_metadata.outputs.metadata_path }}:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"
