version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore
      include: scope
    pull-request-branch-name:
      separator: '-'
    labels:
      - dependencies
    groups:
      rust:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore
      include: scope
    pull-request-branch-name:
      separator: '-'
    labels:
      - dependencies
      - ci
    groups:
      gha:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docs
    groups:
      docs:
        patterns:
          - '*'
