name: Publish Helm Chart

on:
  workflow_dispatch:
    inputs:
      publish-mode:
        description: Publish mode for the chart artifact.
        required: false
        default: dev
        type: choice
        options:
          - dev
          - stable
      ref:
        description: Git ref to publish.
        required: false
        type: string
      pr-number:
        description: Pull request number for dev chart versioning.
        required: false
        type: string
      change-title:
        description: Change title used for Artifact Hub metadata.
        required: false
        type: string
      change-body:
        description: Change body used for Artifact Hub metadata.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Publish Helm Chart
        uses: ./.github/actions/publish-helm-chart
        with:
          publish_mode: ${{ github.event.inputs['publish-mode'] || 'dev' }}
          ref: ${{ github.event.inputs.ref || github.sha }}
          pr_number: ${{ github.event.inputs['pr-number'] || '' }}
          change_title: ${{ github.event.inputs['change-title'] || '' }}
          change_body: ${{ github.event.inputs['change-body'] || '' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          helm_gpg_private: ${{ secrets.HELM_GPG_PRIVATE }}
          helm_gpg_public: ${{ secrets.HELM_GPG_PUBLIC }}
          helm_key_id: ${{ secrets.HELM_KEY_ID }}
          helm_key_secret: ${{ secrets.HELM_KEY_SECRET }}
