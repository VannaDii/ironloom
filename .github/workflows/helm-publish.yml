name: Publish Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: Image tag to write into chart values.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Ironloom Helm Chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Resolve chart metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          image_tag="${{ github.event.inputs.image-tag }}"
          if [[ -z "$image_tag" ]]; then
            image_tag="$version"
          fi
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Stage chart image tag
        run: |
          sed -i "s/tag: \"0.1.0\"/tag: \"${{ steps.meta.outputs.image_tag }}\"/" deploy/helm/ironloom/values.yaml

      - name: Lint chart
        run: helm lint deploy/helm/ironloom

      - name: Package chart
        run: helm package deploy/helm/ironloom --destination "${RUNNER_TEMP}/charts"

      - name: Publish chart
        run: helm push "${RUNNER_TEMP}/charts/ironloom-${{ steps.meta.outputs.version }}.tgz" "oci://ghcr.io/${{ steps.meta.outputs.owner }}/charts"
