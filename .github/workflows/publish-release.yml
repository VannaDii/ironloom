name: Publish Runtime Release

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Image And Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Rust workspace
        run: cargo test --workspace --all-features

      - name: Dispatch Docker publication
        run: gh workflow run docker-publish.yml --ref "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch Helm publication
        run: gh workflow run helm-publish.yml --ref "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
