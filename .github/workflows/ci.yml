name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust Gates (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - beta

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy,rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

  security:
    name: Dependency Policy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cargo deny
        run: cargo deny check

      - name: Cargo audit
        run: cargo audit

  schemas:
    name: Schema Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify committed schemas
        run: cargo run -p ironloom-schemas -- --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build docs
        run: npm run docs:build
        env:
          BASE_URL: /
          SITE_URL: https://ironloom.dev

  coverage:
    name: Coverage And Sonar
    runs-on: ubuntu-latest
    needs:
      - rust
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path target/lcov.info

      - name: Sonar Scan
        if:
          github.event_name != 'pull_request' || github.event.pull_request.user.login
          != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  packaging:
    name: Packaging Smoke
    runs-on: ubuntu-latest
    needs:
      - rust
      - docs
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ironloom-runtime/Dockerfile
          push: false
          platforms: linux/amd64

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/ironloom

      - name: Helm template
        run: helm template ironloom deploy/helm/ironloom
