name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  alignment:
    name: Node Alignment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Verify Node Alignment
        run: npm run verify:node

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:workspace

  schemas:
    name: Generate Schemas and Manifest
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - alignment
      - lint

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Generate Schemas and Manifest
        run: npm run prepare:generated

      - name: Verify Generated Artifacts Are Committed
        run: |
          git diff --exit-code -- \
            packages/openclaw/openclaw.plugin.json \
            'packages/*/schemas/*.schema.json'

      - name: Upload Generated Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: schemas-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  repo:
    name: Verify Repo
    runs-on: ubuntu-latest
    needs: schemas

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Verify Repo
        env:
          BRANCH_NAME: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}
        run: npm run check:repo

  test:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs:
      - schemas

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Download Generated Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: schemas-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Run Live Lab Preflight Tests
        run: npm run test:openclaw:live-lab:preflight

      - name: Test Coverage
        run: npm run test:coverage:workspace

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: coverage

  build:
    name: Upload Build Artifacts
    runs-on: ubuntu-latest
    needs:
      - test
      - repo

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Download Prior Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: schemas-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Build
        run: npm run build:workspace

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            packages/*/dist/**
            packages/*/schemas/*.schema.json
            packages/openclaw/openclaw.plugin.json

  openclaw-hermetic-deep-test:
    name: OpenClaw Hermetic Deep Test
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Verify Node Alignment
        run: npm run verify:node

      - name: Run Hermetic Deep Test
        run: node scripts/openclaw-deep-test.mjs --mode hermetic --report-dir "$RUNNER_TEMP/openclaw-deep"

      - name: Upload Hermetic Deep Test Artifact
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: openclaw-deep-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: ${{ runner.temp }}/openclaw-deep

  docs:
    name: Upload Doc Artifacts
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Build Docs
        run: npm run docs:build

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: |
            site/guide-docs/.vitepress/dist/**

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Cache Sonar packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Deps
        run: npm ci

      - name: Download Coverage Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: .artifacts/coverage

      - name: Restore Coverage Data
        shell: bash
        run: |
          rm -rf coverage

          if [[ -f .artifacts/coverage/coverage/lcov.info ]]; then
            cp -R .artifacts/coverage/coverage ./coverage
          elif [[ -f .artifacts/coverage/lcov.info ]]; then
            mkdir -p coverage
            cp -R .artifacts/coverage/. ./coverage/
          else
            echo "Expected LCOV report was not found in downloaded coverage artifact." >&2
            find .artifacts/coverage -maxdepth 3 -type f | sort >&2 || true
            exit 1
          fi

          test -f coverage/lcov.info

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
