name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          {
            echo "body<<EOF"
            echo "Ironloom ${version}"
            echo
            echo "- Rust supervisor runtime"
            echo "- Docker image: ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ironloom:${version}"
            echo "- Helm chart: oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts/ironloom"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.body }}
