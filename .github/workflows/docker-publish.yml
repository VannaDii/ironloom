name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Ironloom Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/ironloom-runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          labels: |
            org.opencontainers.image.title=Ironloom
            org.opencontainers.image.description=Rust supervisor runtime for auditable engineering operations.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Veritas Labs
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/ironloom:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/ironloom:sha-${{ steps.meta.outputs.short_sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/ironloom:latest
