name: Publish Docker Image

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Docker Image
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.pull_request.merge_commit_sha }}

      - name: Create DevPlat bot token
        id: devplat_bot_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          permission-packages: write
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Resolve metadata
        id: meta_vars
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
        run: |
          echo "node_version=$(tr -d 'v' < .nvmrc)" >> "$GITHUB_OUTPUT"
          registry_owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "registry_owner=${registry_owner}" >> "$GITHUB_OUTPUT"
          package_version="$(
            node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/openclaw/package.json', 'utf8')).version);"
          )"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

          if [[ -n "$PR_HEAD_REF" && "$PR_HEAD_REF" == changeset-release/* ]]; then
            image_version="$package_version"
            image_tags=$(
              printf '%s\n' \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:${package_version}" \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:latest" \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:sha-${short_sha}"
            )
          else
            image_version="${package_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
            image_tags=$(
              printf '%s\n' \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:${image_version}" \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:dev" \
                "ghcr.io/${registry_owner}/devplat-openclaw-runtime:sha-${short_sha}"
            )
          fi

          echo "image_version=${image_version}" >> "$GITHUB_OUTPUT"
          {
            echo "image_tags<<EOF"
            printf '%s\n' "$image_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ steps.devplat_bot_token.outputs.app-slug }}[bot]
          password: ${{ steps.devplat_bot_token.outputs.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/openclaw-runtime/Dockerfile
          push: true
          build-args: |
            NODE_VERSION=${{ steps.meta_vars.outputs.node_version }}
          tags: ${{ steps.meta_vars.outputs.image_tags }}
