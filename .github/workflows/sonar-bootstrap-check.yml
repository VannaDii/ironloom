name: SonarCloud Bootstrap Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - sonar-project.properties
      - crates/ironloom-sonarcloud/**

permissions:
  contents: read

jobs:
  sonar-bootstrap:
    name: Validate SonarCloud Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test SonarCloud crate
        run: cargo test -p ironloom-sonarcloud
