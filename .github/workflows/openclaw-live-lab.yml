name: OpenClaw Live Lab

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Optional ref to validate
        required: false
        type: string
      max_parallel_repos:
        description: Maximum concurrent live-lab repos before the oldest is evicted
        required: false
        default: '6'
        type: string
      retain_failed_resources:
        description: Keep the ephemeral repo, Sonar project, and container after failures
        required: false
        default: false
        type: boolean
      operator_hold_ms:
        description: Milliseconds to keep the live runtime open after posting operator controls
        required: false
        default: '150000'
        type: string

permissions:
  contents: read

jobs:
  live-lab:
    name: OpenClaw Live Lab
    runs-on: ubuntu-latest

    steps:
      - id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - id: install_deps
        name: Install Deps
        run: npm ci

      - id: verify_node
        name: Verify Node Alignment
        run: npm run verify:node

      - id: build_workspace
        name: Build Workspace
        run: npm run build:workspace

      - id: run_live_lab
        name: Run Live Lab
        env:
          LIVE_TEST_DISCORD_APPLICATION_ID: ${{ secrets.LIVE_TEST_DISCORD_APPLICATION_ID }}
          LIVE_TEST_DISCORD_BOT_TOKEN: ${{ secrets.LIVE_TEST_DISCORD_BOT_TOKEN }}
          LIVE_TEST_DISCORD_GUILD_ID: ${{ vars.LIVE_TEST_DISCORD_GUILD_ID }}
          LIVE_TEST_DISCORD_PUBLIC_KEY: ${{ secrets.LIVE_TEST_DISCORD_PUBLIC_KEY }}
          LIVE_TEST_GITHUB_APP_CLIENT_ID: ${{ vars.LIVE_TEST_GITHUB_APP_CLIENT_ID }}
          LIVE_TEST_GITHUB_APP_PRIVATE_KEY: ${{ secrets.LIVE_TEST_GITHUB_APP_PRIVATE_KEY }}
          LIVE_TEST_GITHUB_ORG: ${{ vars.LIVE_TEST_GITHUB_ORG }}
          LIVE_TEST_GITHUB_TOKEN: ${{ secrets.LIVE_TEST_GITHUB_TOKEN }}
          LIVE_TEST_SONAR_ORGANIZATION: ${{ vars.LIVE_TEST_SONAR_ORGANIZATION }}
          LIVE_TEST_SONAR_TOKEN: ${{ secrets.LIVE_TEST_SONAR_TOKEN }}
        run: |
          args=(
            --ref "${{ inputs.ref || github.ref_name }}"
            --report-dir "$RUNNER_TEMP/openclaw-live-lab"
            --max-parallel-repos "${{ inputs.max_parallel_repos }}"
            --operator-hold-ms "${{ inputs.operator_hold_ms }}"
          )

          if [[ "${{ inputs.retain_failed_resources }}" == 'true' ]]; then
            args+=(--retain-failed-resources --retain-container-on-failure)
          fi

          node scripts/openclaw-live-lab.mjs "${args[@]}"

      - name: Normalize Live-Lab Artifact Permissions
        if: always()
        run: |
          if [[ -d "$RUNNER_TEMP/openclaw-live-lab" ]]; then
            sudo chown -R "$(id -u):$(id -g)" "$RUNNER_TEMP/openclaw-live-lab" || true
            sudo chmod -R u+rwX,go+rX "$RUNNER_TEMP/openclaw-live-lab" || true
          fi

      - name: Package Live-Lab Artifacts
        if: always()
        run: |
          artifact_root="$RUNNER_TEMP/openclaw-live-lab"
          artifact="$RUNNER_TEMP/openclaw-live-lab-${{ github.run_id }}-${{ github.run_attempt }}.tgz"

          if [[ ! -d "$artifact_root" ]]; then
            mkdir -p "$artifact_root"
            cat > "$artifact_root/artifact-status.json" <<EOF
          {
            "status": "report-directory-missing",
            "workflow": "${{ github.workflow }}",
            "job": "live-lab",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ inputs.ref || github.ref_name }}",
            "checkout_outcome": "${{ steps.checkout.outcome }}",
            "install_deps_outcome": "${{ steps.install_deps.outcome }}",
            "verify_node_outcome": "${{ steps.verify_node.outcome }}",
            "run_live_lab_outcome": "${{ steps.run_live_lab.outcome }}"
          }
          EOF
          fi

          tar -C "$RUNNER_TEMP" -czf "$artifact" openclaw-live-lab

      - name: Upload Live-Lab Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openclaw-live-lab-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          path: ${{ runner.temp }}/openclaw-live-lab-${{ github.run_id }}-${{
            github.run_attempt }}.tgz
