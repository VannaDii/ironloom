name: TypeScript Matrix

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  compatibility:
    name: TypeScript ${{ matrix.ts-major }} Compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ts-major:
          - '5'
          - '6'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Node alignment
        run: npm run verify:node

      - name: Resolve TypeScript version
        id: ts_version
        run: |
          echo "version=$(node scripts/resolve-typescript-version.mjs ${{ matrix.ts-major }})" >> "$GITHUB_OUTPUT"

      - name: Override TypeScript
        run: npm install --no-save --save-exact "typescript@${{
          steps.ts_version.outputs.version }}"

      - name: Generate committed artifacts
        run: npm run prepare:generated

      - name: Typecheck
        run: npm run typecheck:workspace

      - name: Test
        run: npm run test:workspace

      - name: Build
        run: npm run build:workspace
