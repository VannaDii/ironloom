name: Live Dispatch Canary

on:
  workflow_dispatch:
    inputs:
      orchestration_run_id:
        description: Live-lab orchestration run identifier
        required: true
        type: string
      branch_name:
        description: Branch under test
        required: true
        type: string

permissions:
  contents: read

jobs:
  canary:
    name: Dispatch Canary
    runs-on: ubuntu-latest

    steps:
      - name: Record inputs
        run: |
          mkdir -p report
          cat <<'EOF' > report/run.json
          {
            "orchestrationRunId": "${{ inputs.orchestration_run_id }}",
            "branchName": "${{ inputs.branch_name }}",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}",
            "repository": "${{ github.repository }}"
          }
          EOF

      - name: Upload dispatch report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: dispatch-canary-${{ inputs.orchestration_run_id }}
          path: report/run.json
