{{- include "devplat.requireOpenClawConfig" . -}}
{{- $configData := .Values.config.data | default dict -}}
{{- $hasOpenClawConfig := and .Values.config.enabled (hasKey $configData "openclaw.json") -}}
{{- $gatewayEnv := list -}}
{{- if .Values.discordGateway.enabled -}}
{{- $gatewayEnv = append $gatewayEnv (dict "name" "DISCORD_GATEWAY_ENABLED" "value" "true") -}}
{{- $gatewayEnv = append $gatewayEnv (dict "name" "DISCORD_GATEWAY_URL" "value" .Values.discordGateway.url) -}}
{{- $gatewayEnv = append $gatewayEnv (dict "name" "DISCORD_GATEWAY_INTENTS" "value" (toString .Values.discordGateway.intents)) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devplat.fullname" . }}
  labels:
    {{- include "devplat.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "devplat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devplat.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "devplat.serviceAccountName" . }}
      containers:
        - name: devplat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- if or .Values.env $gatewayEnv }}
          env:
            {{- with $gatewayEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or .Values.envFrom .Values.configMapRefs .Values.secretRefs }}
          envFrom:
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range .Values.configMapRefs }}
            - configMapRef:
                name: {{ . | quote }}
            {{- end }}
            {{- range .Values.secretRefs }}
            - secretRef:
                name: {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- if or $hasOpenClawConfig .Values.persistence.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasOpenClawConfig }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
              subPath: openclaw.json
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or $hasOpenClawConfig .Values.persistence.enabled .Values.extraVolumes }}
      volumes:
        {{- if $hasOpenClawConfig }}
        - name: config
          configMap:
            name: {{ include "devplat.fullname" . }}-config
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "devplat.fullname" . }}-data
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
